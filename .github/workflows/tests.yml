name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: laravel_test
      DB_USERNAME: laravel_user
      DB_PASSWORD: secret_password
      APP_ENV: testing

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: laravel_test
          POSTGRES_USER: laravel_user
          POSTGRES_PASSWORD: secret_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: bcmath, ctype, fileinfo, json, mbstring, pdo, pdo_pgsql, pgsql, tokenizer, xml
          coverage: none
          tools: composer:v2

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: application/vendor
          key: composer-${{ hashFiles('application/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        working-directory: application
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare environment
        working-directory: application
        run: |
          cp .env.testing.example .env.testing || true
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env.testing
          php artisan key:generate --env=testing
          php artisan config:clear --env=testing

      - name: Wait for PostgreSQL to be ready
        run: |
          for i in {1..30}; do
            pg_isready -h 127.0.0.1 -p 5432 && break || sleep 2
          done

      - name: Run migrations (test DB)
        working-directory: application
        run: php artisan migrate --env=testing --force

      - name: Run Module Unit Tests
        working-directory: application
        run: vendor/bin/phpunit --testsuite=Modules_Unit
